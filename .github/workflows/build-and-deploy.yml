name: Build, Push to ECR, Deploy to ECS

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  AWS_REGION: eu-central-1
  ECR_REPOSITORY: blockcontrolio/frontend
  
jobs:
  frontend-build-push-deploy:
    runs-on: ubuntu-latest
    environment: demo

    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1
        with:
          mask-password: true

      - name: Build, tag, and push Docker image to Amazon ECR
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest
          
          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

          echo "Building image: $IMAGE_URI"
          docker build -t $IMAGE_URI .
          
          echo "Pushing image to ECR..."
          docker push $IMAGE_URI

      - name: Render new ECS task definition
        id: render
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition-family: frontend
          container-name: frontend
          image: ${{ env.IMAGE_URI }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.render.outputs.task-definition }}
          cluster: blockcontrolio-demo-cluster
          service: frontend-service-xakmtm23
          wait-for-service-stability: true
          
